<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Music Player</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

<h1>Music Player</h1>

<div class="player">

<img src="images/cover1.jpg" id="cover">

<h2 id="title">Song Title</h2>

<h4 id="artist">Artist Name</h4>

<audio id="audio"></audio>

<input type="range"
id="progress"
value="0">

<div class="time">

<span id="current">0:00</span>

<span id="duration">0:00</span>

</div>

<div class="controls">

<button id="prev">
<i class="fas fa-backward"></i>
</button>

<button id="play">
<i class="fas fa-play"></i>
</button>

<button id="next">
<i class="fas fa-forward"></i>
</button>

</div>

<div class="volume">

<i class="fas fa-volume-up"></i>

<input
type="range"
id="volume"
min="0"
max="100"
value="100">

</div>

<div class="playlist">

<h3>Playlist</h3>

<ul id="playlist">

</ul>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
